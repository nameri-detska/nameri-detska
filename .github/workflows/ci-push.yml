name: ci-push

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      frontend:
        description: 'Deploy frontend'
        type: boolean
        default: false
      backend:
        description: 'Deploy backend'
        type: boolean
        default: false
      syncer:
        description: 'Deploy syncer'
        type: boolean
        default: false

jobs:
  changes:
    runs-on: self-hosted
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      syncer: ${{ steps.filter.outputs.syncer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
            backend:
              - 'backend/**'
              - 'pom.xml'
              - '.formatter/**'
            syncer:
              - 'syncer/**'
              - 'pom.xml'
              - '.formatter/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backend == 'true')
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate with Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Run Backend Tests with Coverage
        env:
          QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn -B verify -f backend/pom.xml

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B sonar:sonar -f backend/pom.xml "-Dsonar.projectKey=nameri-detska_backend" "-Dsonar.organization=nameri-detska" "-Dsonar.host.url=https://sonarcloud.io" "-Dsonar.inclusions=**/*.java"

      - name: Build Quarkus Native Binary
        run: mvn package -Pnative -DskipTests -f backend/pom.xml "-Dquarkus.native.container-build=true" "-Dquarkus.native.builder-image=quay.io/quarkus/ubi9-quarkus-mandrel-builder-image:jdk-25"

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/src/main/docker/Dockerfile.native
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          push: true
          tags: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/nameri-detska/backend:main

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_RUN_JSON_KEY }}

      - name: Deploy Backend to Cloud Run
        run: gcloud run deploy backend --image=europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/nameri-detska/backend:main --region=europe-west1 --platform=managed --quiet

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.frontend == 'true')
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          push: true
          tags: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/nameri-detska/frontend:main

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.CLOUD_RUN_JSON_KEY }}

      - name: Deploy Frontend to Cloud Run
        run: gcloud run deploy frontend --image=europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/nameri-detska/frontend:main --region=europe-west1 --platform=managed --quiet

  syncer:
    needs: changes
    if: needs.changes.outputs.syncer == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.syncer == 'true')
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate with Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Build and Push Syncer Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: syncer/src/main/docker/Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          push: true
          tags: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/nameri-detska/syncer:main
